<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Balance House</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<style>
  :root{--cream:#FCF5ED;--card:#FFFDF8;--ink:#1B2E4D;--navy:#1B2E4D;--green:#243A22;--red:#C5181C;--muted:#7C8698;
    --line:#EADFCE;--sand:#F5EDDD;--amber:#F2B441;--glow:#FFE7A6;--grout:#E9DFCF;
    --brick:#B5613E;--brick2:#8A4326;--wood:#C9A36B;--wood-dark:#A9824E;--sky:#CFE2E8;}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:"Nunito Sans","Segoe UI",system-ui,sans-serif;color:var(--ink);
    background:linear-gradient(180deg,#D9E6EC 0%,#FCF5ED 30%) fixed;padding:14px;min-height:100vh}
  body.dusk{background:linear-gradient(180deg,#2A3B58 0%,#EFE6DA 42%) fixed}
  h1,h2,h3,h4,.bfont{font-family:"Baloo 2","Nunito Sans",sans-serif}
  ::placeholder{color:#A9A69B}
  input,textarea,select,button{font-family:"Nunito Sans",sans-serif}
  .wrap{max-width:1250px;margin:0 auto}
  .layout{display:grid;grid-template-columns:1fr;gap:16px}
  @media(min-width:1000px){
    .layout{grid-template-columns:440px minmax(0,1fr);align-items:start}
    .leftcol{position:sticky;top:10px;max-height:calc(100vh - 20px);overflow-y:auto;scrollbar-width:thin;padding-right:2px}
  }

  /* HUD */
  .hud{display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:9px 16px;margin-bottom:12px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(27,46,77,.06)}
  .logo{height:46px;width:46px;object-fit:cover;border-radius:11px;flex:none}
  .titleblock{display:flex;flex-direction:column;gap:0;min-width:120px}
  .tb1{font-family:"Baloo 2",sans-serif;font-weight:700;font-size:18px;line-height:1.15;color:var(--navy)}
  .tb2{font-size:10.5px;color:var(--muted);font-style:italic}
  .hspace{flex:1}
  .hud .stat{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--navy)}
  .elabel{font-size:10px;font-weight:800;letter-spacing:1px;color:#5F6C82}
  .bat{width:70px;height:15px;border:2px solid var(--navy);border-radius:4px;position:relative;padding:2px}
  .bat::after{content:"";position:absolute;right:-6px;top:3px;width:4px;height:7px;background:var(--navy);border-radius:0 2px 2px 0}
  .bat>span{display:block;height:100%;border-radius:2px;background:linear-gradient(90deg,#69B08F,var(--amber));transition:width .4s}
  .bat.low>span{background:#E07A5F}
  .built{font-size:13px;color:#5F6C82;font-weight:700}
  .built b{color:var(--green);font-weight:800}
  .streak{font-size:13px;font-weight:800;color:#B26A00}
  .lvlwrap{display:flex;flex-direction:column;gap:3px;min-width:126px}
  .lvlrow{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .lvlpill{background:var(--navy);color:var(--cream);border-radius:20px;padding:2px 12px;font-size:12px;font-weight:800;font-family:"Baloo 2",sans-serif;white-space:nowrap}
  .xptext{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap}
  .lvlbar{height:5px;border-radius:4px;background:#EDE4D3;overflow:hidden}
  .lvlbar>span{display:block;height:100%;border-radius:4px;background:var(--red);transition:width .4s}
  .hudbtn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--navy);cursor:pointer;white-space:nowrap}
  .hudbtn:hover{border-color:#cfc0a6}
  .qbtn{width:34px;text-align:center;padding:7px 0;font-weight:800}

  /* banner */
  .banner{display:flex;align-items:center;gap:10px;background:#FBEAE3;border:1px solid #EFC9BC;border-radius:12px;padding:9px 16px;margin-bottom:12px;font-size:13px;font-weight:600;color:#8A3A28}
  .banner .bx{background:none;border:none;color:#B98A7B;cursor:pointer;font-size:15px;margin-left:auto;flex:none}

  /* HOUSE */
  .house{filter:drop-shadow(0 12px 26px rgba(27,46,77,.16))}
  .roof{position:relative;height:86px}
  .roof svg{position:absolute;left:50%;top:0;transform:translateX(-50%);width:104%;height:86px}
  .vision{position:absolute;left:0;right:0;top:26px;text-align:center;color:var(--cream);cursor:pointer}
  .vision .e{font-size:9px;letter-spacing:3px;font-weight:800;opacity:.8}
  .vision .h{font-family:"Baloo 2",sans-serif;font-size:14.5px;font-weight:700;margin-top:1px;text-shadow:0 1px 2px rgba(0,0,0,.35)}
  .vision .t{font-size:10.5px;font-style:italic;opacity:.9}
  #garland{position:absolute;left:56px;top:44px;font-size:17px;display:none}
  .floors{background:var(--green);border-left:7px solid var(--green);border-right:7px solid var(--green);padding:0 4px}
  .floorrow{display:grid;gap:4px;padding:4px 0 0}
  .floortag{color:#9FC4A9;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:5px 2px 1px;display:flex;align-items:center;gap:6px}
  .floortag::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.16)}
  .hroom{position:relative;border-radius:3px;overflow:hidden;cursor:pointer;background:#e9eadf}
  .hroom svg{display:block;width:100%;height:auto}
  .hroom .rlabel{position:absolute;top:5px;left:7px;right:44px;font-size:10.5px;font-weight:800;color:var(--navy);z-index:4;text-shadow:0 1px 0 rgba(255,255,255,.6);pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hroom .rcnt{position:absolute;top:5px;right:7px;font-size:9px;font-weight:800;color:#77808f;z-index:4;pointer-events:none}
  .hroom .paint{position:absolute;bottom:5px;right:5px;z-index:5;background:rgba(255,255,255,.8);border:none;border-radius:6px;font-size:11px;padding:2px 5px;cursor:pointer;opacity:0;transition:.2s}
  .hroom:hover .paint{opacity:1}
  .hroom .deptag{position:absolute;top:19px;left:7px;font-size:8.5px;font-weight:700;color:#8a6310;background:rgba(255,231,166,.92);border-radius:6px;padding:1px 6px;z-index:4;pointer-events:none}
  .fitem{transform-box:fill-box;transform-origin:center bottom}
  .fitem.new{animation:fdrop .6s cubic-bezier(.2,1.5,.4,1)}
  @keyframes fdrop{0%{transform:translateY(-46px) scale(.5);opacity:0}70%{transform:translateY(3px) scale(1.05)}100%{transform:none;opacity:1}}
  .base{background:var(--green);border-left:7px solid var(--green);border-right:7px solid var(--green);border-bottom:7px solid var(--green);border-radius:0 0 6px 6px;padding:8px 6px 10px;position:relative}
  .baselabel{color:#F2D9A0;font-size:10px;letter-spacing:2px;font-weight:800;text-align:center;margin-bottom:6px;text-transform:uppercase}
  .bricks{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .brickbtn{position:relative;min-height:50px;border-radius:4px;background:var(--grout);border:2px dashed #cdbfa6;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#a99a7e;font-size:10px;font-weight:700;gap:2px;user-select:none;transition:.15s;overflow:hidden;text-align:center;line-height:1.15;padding:4px 2px}
  .brickbtn .bi{font-size:16px;filter:grayscale(1) opacity(.55)}
  .brickbtn.set{background:repeating-linear-gradient(0deg,#A9542F 0 10px,#C06A45 10px 22px);border:2px solid var(--brick2);color:#fff;box-shadow:inset 0 -3px 0 rgba(0,0,0,.2);text-shadow:0 1px 2px rgba(0,0,0,.4)}
  .brickbtn.set .bi{filter:none}
  .editbricks{position:absolute;right:8px;top:6px;background:none;border:none;color:var(--glow);opacity:.7;cursor:pointer;font-size:12px;padding:2px}
  .editbricks:hover{opacity:1}
  .ground{margin:0 -6px}
  .ground svg{display:block;width:100%;height:auto}

  /* TODAY */
  .today{background:var(--navy);color:#FCF5ED;border-radius:14px;padding:15px 16px;margin:14px 0}
  .today .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .today h3{margin:0;font-size:15px;font-weight:700}
  .today .dayname{font-size:11px;color:#9FB0CC;font-weight:700}
  .sg{background:var(--glow);color:var(--navy);border:none;border-radius:18px;padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit}
  .today p{margin:3px 0 12px;font-size:12px;color:#9FB0CC}
  .slot{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.09);border:1.5px dashed transparent;border-radius:10px;padding:9px 10px;margin-bottom:8px;transition:.15s}
  .slot.over{border-color:var(--glow);background:rgba(255,231,166,.18)}
  .slot .pin{font-size:10px;font-weight:800;letter-spacing:1px;color:#F2D9A0;min-width:40px}
  .slot input[type=text]{flex:1;background:none;border:none;color:#FCF5ED;font-size:14px;font-family:inherit;outline:none;min-width:0}
  .slot input[type=text]::placeholder{color:#8FA0C0}
  .slot input.done{text-decoration:line-through;color:#8FA0C0}
  .tkl{min-width:18px;height:18px;border:2px solid var(--glow);border-radius:5px;appearance:none;-webkit-appearance:none;cursor:pointer;position:relative;flex:none}
  .tkl:checked{background:var(--glow)}
  .tkl:checked::after{content:"";position:absolute;left:4px;top:0;width:5px;height:10px;border:solid var(--navy);border-width:0 2px 2px 0;transform:rotate(45deg)}
  .clr{background:none;border:none;color:#8FA0C0;cursor:pointer;font-size:16px;flex:none}

  /* RIGHT COLUMN */
  .colhead{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .vtog{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;flex-wrap:wrap}
  .vtog button{border:none;background:none;font-family:"Baloo 2",sans-serif;font-size:12.5px;font-weight:800;color:var(--muted);padding:8px 12px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .vtog button.on{background:var(--navy);color:var(--cream)}
  .tool{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12px;font-weight:700;color:var(--green);cursor:pointer;font-family:inherit;white-space:nowrap}
  .tool:hover{border-color:#cfc0a6}

  .cat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 16px;margin-bottom:12px}
  .cat-header{display:flex;align-items:center;gap:8px;margin-bottom:2px;flex-wrap:wrap}
  .cat h3{margin:0;font-size:15px;color:var(--navy);font-weight:700;display:flex;align-items:center;gap:8px;min-width:0;flex:1}
  .cat .dot{width:11px;height:11px;border-radius:3px;flex:none}
  .cat .cc{font-size:12px;color:var(--muted);font-weight:600}
  .cat .sub{font-size:11px;color:#A9A196;margin:2px 0 8px}
  .roombar{height:5px;border-radius:4px;background:#F0E7D6;overflow:hidden;margin:6px 0 8px}
  .roombar>span{display:block;height:100%;border-radius:4px;transition:width .4s}
  .hidebtn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;font-size:11px;font-weight:700;padding:4px 9px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .hidebtn.on{background:var(--green);color:#fff;border-color:var(--green)}
  .sortsel{font-size:11px;border:1px solid var(--line);border-radius:8px;padding:3px 4px;background:#fff;color:#5F6C82;cursor:pointer;font-family:inherit}

  ul.tasks{list-style:none;margin:0;padding:0}
  ul.tasks li{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px dashed var(--line);font-size:14px;flex-wrap:wrap}
  ul.tasks li:first-child{border-top:none}
  ul.tasks li[draggable=true]{cursor:grab}
  .tk{appearance:none;-webkit-appearance:none;min-width:19px;height:19px;border:2px solid var(--green);border-radius:6px;cursor:pointer;position:relative;transition:.15s;flex:none}
  .tk:checked{background:var(--green)}
  .tk:checked::after{content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .tn{flex:1 1 200px;min-width:0;cursor:text;overflow-wrap:anywhere}
  .tn.editing{background:#fff;border:1px solid var(--navy);border-radius:6px;padding:4px 8px;outline:none}
  .ctl{display:flex;gap:6px;align-items:center;margin-left:auto;flex-wrap:wrap}
  .pri{font-size:9px;font-weight:800;padding:3px 8px;border-radius:10px;letter-spacing:.4px;white-space:nowrap;cursor:pointer;border:none;font-family:inherit}
  .di{font-family:inherit;font-size:11px;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:3px 6px;background:#fff;max-width:118px}
  .di.empty{color:#b3ab98}
  li.done .tn{text-decoration:line-through;color:var(--muted)}
  li.done .pri{opacity:.4}
  .rdots{display:flex;gap:3px;align-items:center;cursor:pointer;padding:3px}
  .ndot{width:10px;height:10px;border-radius:3px;flex:none}
  .up{background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;padding:4px 8px;cursor:pointer;flex:none;font-family:inherit}
  .up:hover{background:#2c4470}
  .del{background:none;border:none;color:#D4CCBB;cursor:pointer;font-size:17px;line-height:1;padding:0 2px;flex:none}
  .del:hover{color:var(--red)}
  .chev{background:none;border:1px solid var(--line);border-radius:7px;font-size:10px;padding:3px 6px;cursor:pointer;color:#8a7a55;font-weight:800;flex:none}
  .hasdet{background:var(--sand);border:none;border-radius:7px;font-size:11px;padding:3px 7px;cursor:pointer;color:#8a7a55;font-weight:700;flex:none}
  .movesb{font-size:10px;color:#B98A7B;font-weight:800;flex:none}
  .blockedb{font-size:11px;flex:none}
  .msflag{font-size:12px;flex:none}
  .udwrap{display:flex;flex-direction:column;flex:none}
  .udwrap button{background:none;border:none;color:#B9B2A2;cursor:pointer;font-size:10px;line-height:1;padding:1px}
  .udwrap button:hover{color:var(--navy)}
  .expander{flex-basis:100%;background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:8px 10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:12px}
  .expander .exlabel{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
  .chip{border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted)}
  .chip.on{color:#fff}
  .detbox{flex-basis:100%;background:#FBF6EC;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:4px;display:flex;flex-direction:column;gap:8px}
  .detlabel{font-size:10px;font-weight:800;letter-spacing:1px;color:#8a7a55;text-transform:uppercase}
  .detlabel i{font-weight:600;text-transform:none;letter-spacing:0;color:#B9B2A2;font-style:normal}
  .detbox textarea{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:13px;min-height:52px;resize:vertical;background:#fff;color:var(--ink);outline:none;font-family:inherit}
  .detbox input[type=text]{border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12.5px;background:#fff;color:var(--ink);outline:none;font-family:inherit}
  .detrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12px;color:#5F6C82;font-weight:700}
  .detrow select{font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:4px;background:#fff;color:var(--ink);max-width:190px;font-family:inherit}
  .addrow{display:flex;gap:6px;margin-top:9px}
  .addrow input{flex:1;border:1.5px dashed #E0D5C0;border-radius:9px;padding:8px 11px;font-size:13px;font-family:inherit;background:none;color:var(--ink);outline:none;min-width:0}
  .addrow input:focus{border-color:var(--green)}
  .addrow button{background:var(--green);border:none;color:#fff;border-radius:9px;padding:0 14px;font-size:16px;cursor:pointer}
  .bucket{margin-bottom:14px}
  .bucket h4{margin:0 0 6px;font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:800;display:flex;align-items:center;gap:8px}
  .bucket h4 .pipe{flex:1;height:1px;background:var(--line)}
  .b-over h4{color:var(--red)}.b-today h4{color:#B26A00}.b-week h4{color:var(--green)}.b-later h4{color:var(--muted)}.b-none h4{color:var(--muted)}
  .inbox{background:#FFF9EC;border:1.5px solid #EFDDB4}
  .inbox h3{color:#8A6310}
  .bphint{font-size:12px;color:#A9A196;margin:4px 2px 0}

  /* CALENDAR */
  .calhead{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .navbtn{border:1px solid var(--line);background:#fff;border-radius:9px;width:30px;height:30px;cursor:pointer;font-weight:800;color:var(--navy)}
  .todaybtn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:6px 10px;cursor:pointer;font-weight:700;font-size:12px;color:var(--navy);font-family:inherit}
  .caltitle{font-family:"Baloo 2",sans-serif;font-weight:700;font-size:17px;min-width:150px;text-align:center}
  .seg{display:flex;gap:3px;background:var(--sand);border-radius:10px;padding:3px}
  .seg button{border:none;font-size:12px;font-weight:800;padding:5px 12px;border-radius:8px;cursor:pointer;background:none;color:var(--muted);font-family:inherit}
  .seg button.on{background:var(--navy);color:#fff}
  .calhint{font-size:11px;color:#A9A196;margin-bottom:8px}
  .dnames{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
  .dname{text-align:center;font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .calcell{min-height:86px;min-width:0;border-radius:8px;padding:5px 5px 4px;background:#FDFAF3;border:1px solid #F0E7D6}
  .calcell.wk{min-height:300px}
  .calcell.out{opacity:.38}
  .calcell.tdy{background:var(--sand);border:2px solid var(--red)}
  .calcell.dragover{outline:2px dashed var(--red);outline-offset:-2px}
  .cnum{font-size:11px;font-weight:800;color:var(--navy);margin-bottom:3px}
  .calcell.out .cnum{color:#B9B2A2}
  .calcell.tdy .cnum{color:var(--red)}
  .chipscol{display:flex;flex-direction:column;gap:3px}
  .calchip{display:flex;align-items:flex-start;gap:4px;border-radius:6px;padding:2px 5px;font-size:10px;font-weight:700;cursor:grab;min-width:0;background:#fff;color:var(--navy)}
  .calchip .cdot{width:6px;height:6px;border-radius:2px;flex:none;margin-top:3px}
  .calchip .ct{min-width:0;overflow-wrap:anywhere;line-height:1.3}
  .calchip.donechip{background:#EFEAE0;color:#A9A196}.calchip.donechip .ct{text-decoration:line-through}
  .calchip.evchip{background:#E3E9DC;color:var(--green)}
  .calchip.remchip{background:#FBF3E2;color:#8A6310}

  /* TIMELINE */
  .tlhead{display:grid;grid-template-columns:170px 1fr;border-bottom:2px solid var(--line);padding-bottom:4px;margin-bottom:2px}
  .tldays{display:grid;grid-template-columns:repeat(14,1fr)}
  .tld{text-align:center;padding:2px 0;border-radius:4px}
  .tld .w{font-size:8.5px;font-weight:800;letter-spacing:.5px}
  .tld .n{font-size:10.5px;font-weight:800}
  .tlrow{display:grid;grid-template-columns:170px 1fr;align-items:center;border-top:1px dashed #F0E7D6;padding:5px 0}
  .tlname{min-width:0;padding-right:8px}
  .tlname .nm{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--navy)}
  .tlname .nm .ndot{width:9px;height:9px}
  .tlname .nm span:last-child{min-width:0;overflow-wrap:anywhere}
  .tlafter{font-size:10px;color:#A9A196;padding-left:15px}
  .tltrack{position:relative;height:24px;border-radius:4px}
  .tlbar{position:absolute;top:4px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding:0 5px;min-width:10px;overflow:hidden}
  .tlbar span{font-size:9px;color:#fff;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tldiamond{position:absolute;top:2px;font-size:12px;color:var(--red)}
  .unschh{margin-top:12px;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#A9A196}
  .uchip{display:inline-flex;align-items:center;gap:5px;background:var(--sand);border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;color:#5F6C82;margin:6px 6px 0 0}
  .uchip .ndot{width:7px;height:7px;border-radius:2px}
  .tlempty{text-align:center;font-size:12px;color:#B9B2A2;padding:18px}

  /* NOTES */
  .notesgrid{display:grid;grid-template-columns:minmax(0,1fr);gap:12px;align-items:start}
  @media(min-width:900px){.notesgrid{grid-template-columns:minmax(0,1fr) 240px}}
  .dumpta{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;min-height:220px;resize:vertical;background:#fff;color:var(--ink);outline:none;line-height:1.6;font-family:inherit}
  .lnhead{display:flex;align-items:center;gap:8px;margin:14px 0 4px;flex-wrap:wrap}
  .lnhead .detlabel{flex:1}
  .lnhead select{font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:4px;background:#fff;color:var(--ink);font-family:inherit}
  .lnrow{display:flex;align-items:center;gap:8px;background:#FBF6EC;border:1px solid var(--line);border-radius:9px;padding:6px 10px;margin-top:4px}
  .lnrow .lt{flex:1;font-size:13px;min-width:0;overflow-wrap:anywhere}
  .mkbtn{background:var(--green);color:#fff;border:none;border-radius:8px;font-size:10.5px;font-weight:800;padding:5px 9px;cursor:pointer;white-space:nowrap}
  .helpcard{background:var(--navy);color:var(--cream);border-radius:14px;padding:15px 16px}
  .helpcard h3{margin:0;font-size:14px;font-weight:700;color:var(--cream)}
  .helpcard .hp{font-size:12px;color:#9FB0CC;line-height:1.6;margin-top:8px}
  .helpcard .hq{background:rgba(255,255,255,.08);border-radius:9px;padding:8px 10px;font-size:12px;line-height:1.5;margin-top:8px}
  .helpcard .hi{font-size:11px;color:#9FB0CC;margin-top:10px;font-style:italic}

  .foot{text-align:center;font-size:12px;color:var(--muted);margin:16px 0 6px}
  .foot button{background:none;border:none;color:var(--muted);text-decoration:underline;cursor:pointer;font-family:inherit;font-size:12px;padding:2px 6px}

  /* toasts */
  #toasts{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:85;max-width:320px;pointer-events:none}
  .toastn{background:var(--navy);color:var(--cream);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:600;box-shadow:0 8px 22px rgba(27,46,77,.3);animation:toastIn .25s ease}
  .toastn.big{background:var(--amber);color:var(--navy);font-weight:700}
  @keyframes toastIn{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(27,46,77,.45);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:20px 12px;overflow-y:auto}
  .overlay.show{display:flex}
  .overlay.center{align-items:center}
  .modal{background:var(--card);border-radius:18px;max-width:620px;width:100%;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal.pop{max-width:420px;text-align:center;animation:popIn .3s ease;padding:26px 28px}
  @keyframes popIn{0%{transform:scale(.75);opacity:0}80%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
  .modal h2{margin:0 0 4px;font-size:18px;color:var(--navy);display:flex;justify-content:space-between;align-items:center;font-weight:700}
  .modal .mx{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
  .modal .msub{font-size:12px;color:#5F6C82;margin:0 0 12px;line-height:1.5}
  .mrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:7px 0;border-top:1px dashed var(--line)}
  .mrow input[type=text]{flex:1;min-width:110px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:13px;font-family:inherit;background:#fff}
  .mrow input[type=color]{width:34px;height:30px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:2px;cursor:pointer}
  .mrow select{border:1px solid var(--line);border-radius:8px;padding:6px;font-size:12px;font-family:inherit;background:#fff;max-width:130px}
  .mrow .mini{background:var(--cream);border:1px solid var(--line);border-radius:7px;font-size:12px;padding:4px 8px;cursor:pointer;font-family:inherit}
  .mrow .mlabel{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;width:100%}
  .maddbtn{margin-top:10px;background:none;border:1.5px dashed #E0D5C0;color:var(--muted);border-radius:9px;padding:8px;font-size:13px;cursor:pointer;width:100%;font-family:inherit}
  .maddbtn:hover{border-color:var(--green);color:var(--green)}
  .modal .note{font-size:11.5px;color:#5F6C82;background:var(--cream);border-radius:8px;padding:8px 10px;margin-top:10px;line-height:1.5}
  .modal h3{font-size:13px;color:var(--green);margin:14px 0 4px;font-weight:800}
  .modal p{font-size:12.5px;line-height:1.55;margin:4px 0}
  .bigbtn{background:var(--red);color:#fff;border:none;border-radius:12px;padding:10px 26px;font-size:14px;font-weight:800;cursor:pointer;font-family:"Baloo 2",sans-serif}
  .navybtn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
  .ghostbtn{background:none;border:none;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .gdots{display:flex;gap:5px;justify-content:center;margin-top:16px}
  .gdots span{width:8px;height:8px;border-radius:50%}
  .swatches{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .swatches button{width:40px;height:40px;border-radius:10px;cursor:pointer;border:1px solid #E0D5C0}
  .swatches button.on{border:3px solid var(--navy)}
  .optbtns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .optbtns button{flex:1;border-radius:10px;padding:9px;font-size:13px;font-weight:800;cursor:pointer;background:#fff;color:var(--navy);border:1px solid #E0D5C0;font-family:inherit;white-space:nowrap}
  .optbtns button.on{background:var(--navy);color:#fff}
  .optbtns button:disabled{opacity:.45;cursor:not-allowed}
  .plabel{font-size:12px;color:#5F6C82;margin-top:14px;font-weight:700}
  .plabel i{color:#A9A196;font-weight:600;font-style:normal}
  .mailitem{display:flex;align-items:center;gap:9px;border-radius:10px;padding:8px 10px;margin-top:6px}
  .mailitem.rem{background:#FBF3E2;border:1px solid #F0E2C4}
  .mailitem.ev{background:#E9EFE4;border:1px solid #D4E0CB}
  .mailitem .mt{flex:1;font-size:13px;font-weight:600;color:#6B5A33;min-width:0;overflow-wrap:anywhere}
  .mailitem .mt.done{text-decoration:line-through}
  .mailitem .mwhen{font-size:11px;color:#B29A62;font-weight:700;white-space:nowrap}
  .mailitem .del{font-size:15px}
  .maillist{max-height:230px;overflow-y:auto}
  .mailform{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
  .mailform input[type=text]{flex:2;min-width:150px;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px;background:#fff;outline:none;color:var(--ink);font-family:inherit}
  .mailform input[type=date],.mailform input[type=time]{border:1px solid var(--line);border-radius:10px;padding:7px;font-size:12px;background:#fff;color:var(--ink);font-family:inherit}
  .mailform .until{font-size:11px;color:var(--muted);font-weight:700}

  .confetti{position:fixed;width:9px;height:9px;z-index:90;pointer-events:none;border-radius:2px;animation:cfall 1.1s ease-in forwards}
  @keyframes cfall{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--cx),var(--cy)) rotate(540deg);opacity:0}}

  /* ---- storm day ---- */
  .stormbtn{background:none;border:1.5px solid rgba(255,255,255,.35);color:#C9D4E4;border-radius:16px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
  .stormbtn:hover{border-color:var(--glow);color:var(--glow)}
  .stormlayer{position:absolute;inset:0;z-index:6;pointer-events:none;border-radius:0 0 6px 6px;overflow:hidden;
    background:linear-gradient(180deg,rgba(70,90,110,.28),rgba(70,90,110,.16));display:none}
  .storm .stormlayer{display:block}
  .stormlayer::before{content:"";position:absolute;inset:-100% 0 0 0;
    background-image:repeating-linear-gradient(75deg,transparent 0 11px,rgba(210,228,240,.5) 11px 12px);
    animation:rainfall .7s linear infinite}
  @keyframes rainfall{0%{transform:translateY(0)}100%{transform:translateY(24px)}}
  .house{position:relative}
  .cozycard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 20px;text-align:center}
  .cozycard .big{font-size:34px;margin-bottom:8px}
  .cozycard h3{margin:0 0 6px;color:var(--navy);font-size:17px}
  .cozycard p{margin:0 auto 14px;font-size:13.5px;color:var(--muted);max-width:420px;line-height:1.6}
  .cozycard button{background:var(--navy);color:#fff;border:none;border-radius:20px;padding:9px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}

  /* ---- cocktail bar ---- */
  .barcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-top:14px}
  .barcard .bhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
  .barcard h3{margin:0;font-size:15px;color:var(--navy)}
  .barcard .bsub{font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .barrow{display:flex;gap:12px;align-items:flex-end}
  .glasswrap{flex:none;text-align:center}
  .glasswrap .glabel{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-top:3px}
  .pourgrid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:6px}
  .pourbtn{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:7px 4px 6px;cursor:pointer;font-family:inherit;text-align:center;transition:.12s;position:relative}
  .pourbtn:hover{border-color:var(--green);transform:translateY(-1px)}
  .pourbtn .pi{font-size:17px;display:block}
  .pourbtn .pl{font-size:10px;font-weight:700;color:var(--ink);display:block;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pourbtn .pc{position:absolute;top:-6px;right:-5px;background:var(--navy);color:#fff;font-size:9.5px;font-weight:800;border-radius:9px;min-width:17px;padding:1.5px 4px}
  .weekglasses{display:flex;gap:5px;align-items:flex-end;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line)}
  .wgday{text-align:center;flex:1;cursor:pointer;border-radius:8px;padding:3px 1px}
  .wgday:hover{background:var(--sand)}
  .wgday.today{background:#FFF3D6}
  .wgday .wd{font-size:9px;font-weight:800;color:var(--muted)}
  .mixhint{margin-top:9px;font-size:11.5px;color:#8A6310;background:#FFF9E9;border:1px solid #EAD9A8;border-radius:9px;padding:6px 10px}
  .mixhint.good{color:#1F6048;background:#E1F1EA;border-color:#BBDCCB}

  /* ---- week strip ---- */
  .weekstrip{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:12px}
  .weekstrip .whead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .weekstrip h3{margin:0;font-size:14px;color:var(--navy)}
  .wnav{display:flex;gap:4px;align-items:center}
  .wnav button{background:var(--sand);border:1px solid var(--line);border-radius:7px;font-size:12px;padding:2px 9px;cursor:pointer;font-family:inherit;color:var(--navy);font-weight:700}
  .wnav .wlabel{font-size:11px;color:var(--muted);font-weight:700;padding:0 4px}
  .wcols{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .wcol{border:1px solid var(--line);border-radius:9px;padding:5px 3px 6px;text-align:center;cursor:pointer;background:#fff;min-height:86px;transition:.12s}
  .wcol:hover{border-color:var(--green)}
  .wcol.today{border-color:var(--amber);background:#FFFBEF;box-shadow:0 0 0 2px var(--glow)}
  .wcol .dn{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase}
  .wcol .dt{font-size:12px;font-weight:800;color:var(--ink)}
  .wcol .shifts{display:flex;flex-direction:column;gap:2px;margin:4px 2px}
  .wcol .shift{font-size:8.5px;font-weight:800;color:#fff;border-radius:4px;padding:2px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wcol .heavy{font-size:9px;margin-top:2px}
  .wsub{font-size:10.5px;color:var(--muted);margin-top:7px}
  .mixrow{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px dashed var(--line)}
  .mixrow:first-child{border-top:none}
  .mixrow .mi{font-size:17px;width:24px;text-align:center}
  .mixrow .ml{flex:1;font-size:13.5px;font-weight:600}
  .mixrow .step{display:flex;gap:6px;align-items:center}
  .mixrow .step button{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-size:15px;cursor:pointer;color:var(--navy);font-weight:800}
  .mixrow .step button:hover{border-color:var(--green)}
  .mixrow .cnt{min-width:20px;text-align:center;font-weight:800;font-size:14px}


  /* auth bar */
  .authbar{display:flex;align-items:center;gap:8px}
  .gbtn{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .gbtn:hover{border-color:#b9c4c0}
  .gbtn svg{width:16px;height:16px;flex:none}
  .avatar{width:30px;height:30px;border-radius:50%;border:2px solid var(--navy);cursor:pointer;object-fit:cover}
  .synced{font-size:10px;font-weight:800;color:#3E7C6E;letter-spacing:.5px}
  .synced.off{color:#B26A00}
  .userchip{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:3px 10px 3px 4px}
  .signout{background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;font-family:inherit;padding:0}
  .cloudnote{background:#FFF9EC;border:1.5px solid #EFDDB4;border-radius:12px;padding:9px 13px;font-size:12px;color:#8A6310;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .cloudnote b{color:#6b4d0d}
  /* emoji picker */
  .emojigrid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-height:180px;overflow-y:auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px;margin-top:6px}
  .emojigrid button{background:none;border:none;font-size:19px;cursor:pointer;padding:3px;border-radius:6px}
  .emojigrid button:hover{background:var(--sand)}
  .brickedit{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:8px;background:#fff}
  .brickedit .brow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  /* onboarding */
  .onbox{text-align:center;padding:10px 6px}
  .onbox h2{justify-content:center!important}
  .onbox input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;margin:12px 0 4px;text-align:center}
  .onbox .go{background:var(--red);color:#fff;border:none;border-radius:20px;padding:10px 26px;font-size:14px;font-weight:800;cursor:pointer;font-family:"Baloo 2",sans-serif;margin-top:12px}
  .hroom.dragover{outline:3px dashed var(--glow);outline-offset:-3px}
</style>

/* ---------- persistence */
let state=null;
function migrateFromOld(raw){
  try{
    const old=JSON.parse(raw);
    if(!old||!old.rooms) return null;
    const s=seedState();
    s.tasks=[];s.rooms=[];
    const themeGuess={sessions:"wellness",marketing:"studio",learning:"library",admin:"office"};
    old.rooms.forEach((r,i)=>{
      s.rooms.push({id:r.id||uid(),name:r.name||("Room "+(i+1)),wall:r.wall||"#E4EFEA",dot:r.dot||"#3E8E7E",
        floor:(r.id==="marketing"||r.id==="learning")?2:1,dependsOn:r.id==="marketing"?"sessions":null,
        theme:themeGuess[r.id]||"cozy",style:0,windows:2,sort:"manual"});
      (r.tasks||[]).forEach(tk=>s.tasks.push({id:uid(),t:tk.t,tagId:tk.p||"week",deadline:tk.deadline||"",d:!!tk.d,roomIds:[r.id||s.rooms[s.rooms.length-1].id]}));
    });
    if(old.daily&&old.daily.date===todayISO()){
      s.daily.bricks=old.daily.bricks||s.daily.bricks;
      s.daily.three=(old.daily.three||[]).map(x=>({taskId:null,text:x.t||"",d:!!x.d}));
      while(s.daily.three.length<3)s.daily.three.push({taskId:null,text:"",d:false});
    }
    if(old.view)s.view=old.view;
    if(old.hideDone!==undefined)s.hideDone=old.hideDone;
    return s;
  }catch(e){return null;}
}
function normalize(){
  if(!state.tags||!state.tags.length)state.tags=defaultTags();
  if(!state.rooms)state.rooms=[];
  state.rooms.forEach(r=>{r.floor=r.floor||1;if(r.style===undefined)r.style=0;if(!THEMES[r.theme])r.theme="cozy";
    if(![1,2,3].includes(r.windows))r.windows=2;
    if(!["manual","date","pri","alpha"].includes(r.sort))r.sort="manual";
    if(r.dependsOn&&!state.rooms.some(x=>x.id===r.dependsOn))r.dependsOn=null;});
  if(!state.tasks)state.tasks=[];
  state.tasks.forEach((t,i)=>{
    if(!Array.isArray(t.roomIds))t.roomIds=t.roomIds?[t.roomIds]:(t.roomId?[t.roomId]:[]);
    t.roomIds=t.roomIds.filter(id=>state.rooms.some(r=>r.id===id));
    if(!state.tags.some(g=>g.id===t.tagId))t.tagId=state.tags[0].id;
    if(t.deadline===undefined)t.deadline="";
    if(typeof t.details!=="string")t.details="";
    if(typeof t.need!=="string")t.need="";
    if(typeof t.blocker!=="string")t.blocker="";
    if(typeof t.collab!=="string")t.collab="";
    if(typeof t.moves!=="number")t.moves=0;
    if(typeof t.order!=="number")t.order=i;
    if(t.dependsOn===undefined)t.dependsOn=null;
    if(t.milestone===undefined)t.milestone=false;
  });
  state.tasks.forEach(t=>{if(t.dependsOn&&(t.dependsOn===t.id||!state.tasks.some(x=>x.id===t.dependsOn)))t.dependsOn=null;});
  if(!Array.isArray(state.reminders))state.reminders=[];
  state.reminders.forEach(r=>{if(r.d===undefined)r.d=false;if(r.date===undefined)r.date="";if(r.time===undefined)r.time="";});
  if(!Array.isArray(state.events))state.events=[];
  state.events.forEach(ev=>{if(ev.date===undefined)ev.date="";if(ev.dateEnd===undefined)ev.dateEnd="";});
  if(typeof state.dump!=="string")state.dump="";
  if(!state.custom)state.custom={dusk:false};
  if(!state.streak)state.streak={n:0,last:""};
  if(!state.lastLevel)state.lastLevel=1;
  if(!state.why)state.why=seedState().why;
  if(typeof state.rev!=="number")state.rev=0;
  if(!Array.isArray(state.ingredients)||!state.ingredients.length)state.ingredients=defaultIngredients();
  state.ingredients.forEach(g=>{if(!g.id)g.id=uid();if(!g.icon)g.icon="🧉";if(!g.color)g.color="#3E8E7E";if(!g.dose)g.dose=3;if(g.kind!=="work"&&g.kind!=="life")g.kind="life";});
  if(typeof state.pours!=="object"||!state.pours)state.pours={};
  if(state.daily.storm===undefined)state.daily.storm=false;
  if(state.daily.nagged===undefined)state.daily.nagged=false;
  if(state.lastStorm===undefined)state.lastStorm="";

  if(!Array.isArray(state.bricksDef)||state.bricksDef.length!==4)state.bricksDef=defaultBricks();
  state.bricksDef.forEach(b=>{if(!b.icon)b.icon="🧱";if(!b.label)b.label="Brick";if(!b.color)b.color="#B5613E";});
  if(state.onboarded===undefined)state.onboarded=true;
  if(!state.daily)state.daily={date:todayISO(),bricks:[false,false,false,false],three:[]};
  state.daily.three=(state.daily.three||[]).slice(0,3).map(x=>({taskId:x.taskId||null,text:x.text||x.t||"",d:!!x.d}));
  while(state.daily.three.length<3)state.daily.three.push({taskId:null,text:"",d:false});
  /* one-time switch to the v7 level curve: re-anchor lastLevel quietly, no popup */
  if(state.levelSystem!==2){
    state.levelSystem=2;
    state.lastLevel=levelFor(xpOf());
  }
}
function rollover(){
  if(state.daily.date===todayISO())return;
  state.daily={date:todayISO(),bricks:[false,false,false,false],storm:false,nagged:false,
    three:[{taskId:null,text:"",d:false},{taskId:null,text:"",d:false},{taskId:null,text:"",d:false}]};
  if(state.streak.last&&state.streak.last!==todayISO()&&state.streak.last!==yesterISO()){
    /* storm days freeze the streak — rest is maintenance, not failure */
    if(!(state.lastStorm&&state.lastStorm>=state.streak.last))state.streak.n=0;
  }
}
function backup(){
  try{
    const k=BK_PREFIX+todayISO();
    if(!localStorage.getItem(k))localStorage.setItem(k,JSON.stringify(state));
    const keys=Object.keys(localStorage).filter(x=>x.startsWith(BK_PREFIX)).sort();
    while(keys.length>7)localStorage.removeItem(keys.shift());
  }catch(e){}
}
function load(){
  let raw=null;
  try{raw=localStorage.getItem(KEY);}catch(e){}
  if(raw){try{state=JSON.parse(raw);}catch(e){state=null;}}
  if(!state){
    for(const ok of OLD_KEYS){
      let o=null;try{o=localStorage.getItem(ok);}catch(e){}
      if(o){state=migrateFromOld(o);if(state)break;}
    }
  }
  if(!state)state=seedState();
  normalize();rollover();backup();saveQuiet();
}
/* save(): every real user edit bumps `rev`. Sync conflicts are resolved by rev
   (most edits wins), NOT by wall clock — so a stale device that merely loads or
   rolls over at midnight can never overwrite hours of newer work. */
function save(skipCloud){
  state.rev=(state.rev||0)+1;
  state.updatedAt=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}
  if(!skipCloud&&window.cloudPush)window.cloudPush();
}
/* housekeeping persist (page load, midnight rollover): syncs but claims no new edits */
function saveQuiet(){
  state.updatedAt=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}
  if(window.cloudPush)window.cloudPush();
}
/* remote state arriving from another device / after sign-in */
function applyRemote(remote,remoteUpdatedAt){
  state=remote;normalize();rollover();
  state.updatedAt=remoteUpdatedAt||Date.now();
  try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}
  renderAll();
  /* their real house just loaded — retire the welcome question if it's showing */
  if(state.onboarded&&document.getElementById("goalInput"))closeModal();
}

/* ---------- helpers */
const tagById=id=>state.tags.find(t=>t.id===id)||state.tags[0];
const roomById=id=>state.rooms.find(r=>r.id===id);
const taskById=id=>state.tasks.find(t=>t.id===id);
const tasksForRoom=rid=>state.tasks.filter(t=>t.roomIds.includes(rid));
const inboxTasks=()=>state.tasks.filter(t=>!t.roomIds.length);
function roomStats(rid){const ts=tasksForRoom(rid);const done=ts.filter(t=>t.d).length;return{done,all:ts.length,pct:ts.length?done/ts.length:0};}
function totals(){const done=state.tasks.filter(t=>t.d).length,all=state.tasks.length;
  let lit=0;state.rooms.forEach(r=>{const s=roomStats(r.id);if(s.all&&s.done===s.all)lit++;});return{done,all,lit};}
function xpOf(){const{done,lit}=totals();return done*10+lit*50+state.streak.n*15;}
function depOf(t){return t.dependsOn?taskById(t.dependsOn):null;}
function isBlocked(t){const d=depOf(t);return !!(d&&!d.d);}
function hasDetails(t){return !!((t.details&&t.details.trim())||(t.need&&t.need.trim())||(t.blocker&&t.blocker.trim())||(t.collab&&t.collab.trim()));}
function bucketOf(s){if(!s)return"none";const diff=Math.round((new Date(s+"T00:00")-new Date(todayISO()+"T00:00"))/864e5);
  if(diff<0)return"over";if(diff===0)return"today";if(diff<=7)return"week";return"later";}
function shade(hex,f){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,Math.round(r+f)));g=Math.max(0,Math.min(255,Math.round(g+f)));b=Math.max(0,Math.min(255,Math.round(b+f)));
  return"#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function pillStyle(tag){return`background:${tag.color}20;color:${tag.color}`;}
function eventCovers(ev,iso){if(!ev.date)return false;const end=(ev.dateEnd&&ev.dateEnd>ev.date)?ev.dateEnd:ev.date;return iso>=ev.date&&iso<=end;}

/* ---------- toasts */
function toast(m,big){
  const box=document.getElementById("toasts");
  const t=document.createElement("div");t.className="toastn"+(big?" big":"");t.textContent=m;
  box.appendChild(t);
  while(box.children.length>3)box.removeChild(box.firstChild);
  setTimeout(()=>{if(t.parentNode)t.remove();},big?3400:2400);
}
function confetti(x,y){
  const colors=["#F2B441","#C5181C","#1B2E4D","#3E8E7E","#FFE7A6"];
  const cx=x??innerWidth/2, cy=y??innerHeight/3;
  for(let i=0;i<16;i++){
    const d=document.createElement("div");d.className="confetti";
    d.style.left=cx+"px";d.style.top=cy+"px";
    d.style.background=colors[i%colors.length];
    d.style.setProperty("--cx",(Math.random()*220-110)+"px");
    d.style.setProperty("--cy",(Math.random()*160+60)+"px");
    if(i%3===0)d.style.borderRadius="50%";
    document.body.appendChild(d);setTimeout(()=>d.remove(),1200);
  }
}
function bigBurst(){
  [0.2,0.5,0.8].forEach((f,i)=>setTimeout(()=>confetti(innerWidth*f,innerHeight/4),i*160));
}

/* ---------- gentle reflection when a deadline keeps sliding */
function bumpMoves(tk){
  tk.moves=(tk.moves||0)+1;
  if(tk.moves===3)reflectionModal(tk,"Why are you postponing this?","“"+tk.t+"” has moved three times now. No judgement — sometimes naming the reason makes it smaller.");
  else if(tk.moves===5)reflectionModal(tk,"Is something preventing you from getting ahead with this?","Maybe other tasks had higher priority, or life just happened — that's okay. Would breaking it into a smaller first step help?");
}

let justFurnished=null; // roomId

/* ---------- render: HUD */
function renderHUD(){
  const {done,all}=totals();
  document.getElementById("pct").textContent=(all?Math.round(done/all*100):0)+"%";
  const e=state.daily.bricks.filter(Boolean).length/4*100;
  const bat=document.getElementById("bat");bat.classList.toggle("low",e<50);
  document.getElementById("batf").style.width=e+"%";
  document.getElementById("streak").textContent="🔥 "+state.streak.n;
  const xp=xpOf();

function roomSVG(room){

  for(let i=0;i<shown;i++){
    const it=FURN[items[i]];if(!it)continue;
    let tx=100,ty=104;
    if(it.w==="rug"){tx=100;ty=116;}
    else if(it.w==="wall"){tx=wallSlots[wi%wallSlots.length];wi++;ty=46;}
    else{tx=floorSlots[fi%floorSlots.length];fi++;ty=104;}

  const glowLayer=lit?`<rect x="0" y="0" width="200" height="130" fill="url(#glow_${room.id})"/>`:"";
  return `<svg viewBox="0 0 200 130" preserveAspectRatio="none">

function renderHouse(){

      };

      el.ondragstart=e=>{e.dataTransfer.setData("text/plain","room:"+room.id);};
      el.ondragover=e=>{e.preventDefault();el.classList.add("dragover");};
      el.ondragleave=()=>el.classList.remove("dragover");

        e.preventDefault();el.classList.remove("dragover");

        if(!data.startsWith("room:"))return;
        const srcId=data.slice(5);if(srcId===room.id)return;

        const si=state.rooms.indexOf(src),ti=state.rooms.indexOf(room);

        const f=src.floor;src.floor=room.floor;room.floor=f;

/* ---------- cocktail bar: the week is a drink; ingredients are what it's mixed from */
const DAY_CAP=6; /* pours that visually fill one day's glass */
function dateAddISO(iso,days){const d=new Date(iso+"T12:00");d.setDate(d.getDate()+days);return localISO(d);}
function weekDates(offset){ /* Mon-Sun of current week + offset weeks */
  const t=new Date();const dow=(t.getDay()+6)%7;t.setDate(t.getDate()-dow+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(t);d.setDate(t.getDate()+i);return localISO(d);});
}
function poursOf(date){return state.pours[date]||{};}
function setPour(date,ingId,n){
  if(!state.pours[date])state.pours[date]={};
  if(n<=0)delete state.pours[date][ingId];else state.pours[date][ingId]=n;
  if(!Object.keys(state.pours[date]).length)delete state.pours[date];

}
function workLoad(date){

function glassSVG(mix,w,h){

  let layers="",y=gy+gh;

  });

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    ${straw}
    <path d="M${gx} ${gy} L${gx+gw*0.12} ${gy+gh} Q${gx+gw*0.5} ${gy+gh+w*0.08} ${gx+gw-gw*0.12} ${gy+gh} L${gx+gw} ${gy} Z" fill="#EAF4F7" opacity=".55"/>

  </svg>`;
}
function weekMix(offset){
  const mix={};weekDates(offset).forEach(d=>{const p=poursOf(d);Object.keys(p).forEach(k=>mix[k]=(mix[k]||0)+p[k]);});

}

function addToToday(taskId){

function dropOnDay(iso){
  if(!dragging)return;
  const d=dragging;dragging=null;
  if(d.type==="task"){
    const tk=taskById(d.id);if(!tk||tk.deadline===iso)return;
    const had=!!tk.deadline;tk.deadline=iso;
    if(had)bumpMoves(tk);
    save();renderAll();toast("Deadline moved to "+iso+" 📅");
  }else if(d.type==="rem"){
    const r=state.reminders.find(x=>x.id===d.id);if(!r||r.date===iso)return;
    r.date=iso;save();renderAll();toast("Reminder moved 🔔");
  }else if(d.type==="event"){
    const ev=state.events.find(x=>x.id===d.id);if(!ev||ev.date===iso)return;
    if(ev.date&&ev.dateEnd&&ev.dateEnd>ev.date){
      const delta=(new Date(iso+"T00:00")-new Date(ev.date+"T00:00"))/864e5;
      ev.dateEnd=localISO(new Date(new Date(ev.dateEnd+"T00:00").getTime()+delta*864e5));
    }
    ev.date=iso;save();renderAll();toast("Event moved 🎊");
  }
}

function makeDayCell(d,inMonth,isWeekMode,dayLabel){
  const today=new Date();today.setHours(0,0,0,0);
  const iso=localISO(d);
  const cell=document.createElement("div");
  cell.className="calcell"+(isWeekMode?" wk":"")+(d.getTime()===today.getTime()?" tdy":"")+(inMonth?"":" out");
  const num=document.createElement("div");num.className="cnum";num.textContent=dayLabel;
  if(isWeekMode)num.style.textAlign="center";
  cell.appendChild(num);
  const col=document.createElement("div");col.className="chipscol";
  chipsFor(iso).forEach(ch=>col.appendChild(ch));
  cell.appendChild(col);
  cell.ondragover=e=>{e.preventDefault();cell.classList.add("dragover");};
  cell.ondragleave=()=>cell.classList.remove("dragover");
  cell.ondrop=e=>{e.preventDefault();cell.classList.remove("dragover");
    /* task rows dragged from the lists also carry their id as plain text */
    if(!dragging){const id=e.dataTransfer.getData("text/plain");if(id&&taskById(id))dragging={type:"task",id};}
    dropOnDay(iso);};
  return cell;
}
function renderCalendar(wrap){
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayNames=["MON","TUE","WED","THU","FRI","SAT","SUN"];
  const today=new Date();today.setHours(0,0,0,0);
  const cal=ui.cal||{y:today.getFullYear(),m:today.getMonth()};
  const monday=new Date(today);monday.setDate(today.getDate()-((today.getDay()+6)%7)+ui.weekOff*7);
  const weekEnd=new Date(monday);weekEnd.setDate(monday.getDate()+6);
  const title=ui.calMode==="month"?monthNames[cal.m]+" "+cal.y
    :monthNames[monday.getMonth()]+" "+monday.getDate()+" – "+(weekEnd.getMonth()===monday.getMonth()?"":monthNames[weekEnd.getMonth()]+" ")+weekEnd.getDate();
  const sec=document.createElement("div");sec.className="cat";
  sec.innerHTML=`<div class="calhead">
      <button class="navbtn" id="calPrev">‹</button>
      <div class="caltitle">${title}</div>
      <button class="navbtn" id="calNext">›</button>
      <button class="todaybtn" id="calToday">today</button>
      <span style="flex:1"></span>
      <div class="seg">
        <button id="calMM" class="${ui.calMode==="month"?"on":""}">Month</button>
        <button id="calMW" class="${ui.calMode==="week"?"on":""}">Week</button>
      </div>
      <button class="todaybtn" id="calAdd">+ reminder / event</button>
    </div>
    <div class="calhint">Drag any task, reminder or event onto another day to move its date. Drag a task from the lists here too.</div>
    <div class="dnames">${dayNames.map(n=>`<div class="dname">${n}</div>`).join("")}</div>`;
  const grid=document.createElement("div");grid.className="calgrid";
  if(ui.calMode==="month"){
    const first=new Date(cal.y,cal.m,1);
    const lead=(first.getDay()+6)%7;
    const daysIn=new Date(cal.y,cal.m+1,0).getDate();
    const rows=Math.ceil((lead+daysIn)/7);
    for(let i=0;i<rows*7;i++){
      const d=new Date(cal.y,cal.m,i-lead+1);
      grid.appendChild(makeDayCell(d,d.getMonth()===cal.m,false,d.getDate()));
    }
  }else{
    for(let i=0;i<7;i++){
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      grid.appendChild(makeDayCell(d,true,true,dayNames[i]+" "+d.getDate()));
    }
  }
  sec.appendChild(grid);
  wrap.appendChild(sec);
  sec.querySelector("#calPrev").onclick=()=>{
    if(ui.calMode==="month"){const m=cal.m-1;ui.cal={y:m<0?cal.y-1:cal.y,m:(m+12)%12};}
    else ui.weekOff--;
    renderTasks();};
  sec.querySelector("#calNext").onclick=()=>{
    if(ui.calMode==="month"){const m=cal.m+1;ui.cal={y:m>11?cal.y+1:cal.y,m:m%12};}
    else ui.weekOff++;
    renderTasks();};
  sec.querySelector("#calToday").onclick=()=>{ui.cal=null;ui.weekOff=0;renderTasks();};
  sec.querySelector("#calMM").onclick=()=>{ui.calMode="month";renderTasks();};
  sec.querySelector("#calMW").onclick=()=>{ui.calMode="week";renderTasks();};
  sec.querySelector("#calAdd").onclick=mailboxModal;
}
/* ---------- timeline view */
function renderTimeline(wrap){
  const today=new Date();today.setHours(0,0,0,0);
  const tIso=todayISO();
  const days=Array.from({length:14},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()+i);return d;});
  const wd=["SU","MO","TU","WE","TH","FR","SA"];
  const sec=document.createElement("div");sec.className="cat";
  sec.innerHTML=`<h3 style="margin:0 0 4px;font-size:15px;display:flex">📊 Timeline — next 14 days</h3>
    <div class="sub" style="margin-bottom:10px">Bars run from today (or from the task they build on) to their deadline. ◆ marks a milestone, ⛓ waits on another task.</div>`;
  const head=document.createElement("div");head.className="tlhead";
  head.innerHTML=`<div></div><div class="tldays">${days.map((d,i)=>{
    const wknd=d.getDay()===0||d.getDay()===6;
    const color=i===0?"#C5181C":(wknd?"#B29A62":"#7C8698");
    return `<div class="tld" style="background:${i===0?"#FBEAE3":"transparent"}"><div class="w" style="color:${color}">${i===0?"TODAY":wd[d.getDay()]}</div><div class="n" style="color:${color}">${d.getDate()}</div></div>`;
  }).join("")}</div>`;
  sec.appendChild(head);
  const trackBg="repeating-linear-gradient(90deg,transparent 0,transparent calc(100%/14 - 1px),#EADFCE calc(100%/14 - 1px),#EADFCE calc(100%/14)),linear-gradient(90deg,"+days.map((d,i)=>{
    const wknd=d.getDay()===0||d.getDay()===6;
    const c=i===0?"#FBEAE3":(wknd?"#F6F0E1":"#FDFAF3");
    return c+" "+(i/14*100).toFixed(2)+"%,"+c+" "+((i+1)/14*100).toFixed(2)+"%";
  }).join(",")+")";
  const endIso=localISO(days[13]);
  const open=state.tasks.filter(t=>!t.d);
  const inWin=open.filter(t=>t.deadline&&t.deadline<=endIso);
  const dayIdx=iso=>days.findIndex(d=>localISO(d)===iso);
  const rows=inWin.map(t=>{
    const room=t.roomIds[0]?roomById(t.roomIds[0]):null;
    const dot=room?room.dot:"#B29A62";
    const overdue=t.deadline<tIso;
    const endIdx=overdue?0:dayIdx(t.deadline);
    const dep=depOf(t);
    let startIdx=0,conflict=false;
    if(dep&&dep.deadline&&!dep.d){
      const di=dayIdx(dep.deadline);
      if(di>=0){if(di+1>endIdx){conflict=true;startIdx=endIdx;}else startIdx=di+1;}
      else if(dep.deadline>endIso){conflict=true;startIdx=endIdx;}
    }
    const span=Math.max(1,endIdx-startIdx+1);
    return {t,dot,dep,overdue,conflict,startIdx,endIdx,span};
  }).sort((a,b)=>a.startIdx-b.startIdx||a.span-b.span);
  rows.forEach(r=>{
    const row=document.createElement("div");row.className="tlrow";
    const barBg=r.overdue?"#C5181C":(r.conflict?"#B26A00":r.dot);
    const barLabel=r.overdue?"overdue":(r.conflict?"⚠ due before its base task":(r.dep&&!r.dep.d?"⛓":""));
    const title=r.t.t+" — due "+r.t.deadline+(r.dep?" · after: "+r.dep.t:"")+(r.conflict?" · ⚠ its base task finishes later — consider moving this deadline":"");
    row.innerHTML=`<div class="tlname">
        <div class="nm"><span class="ndot" style="background:${r.dot}"></span><span>${esc(r.t.t)}</span></div>
        ${r.dep?`<div class="tlafter">after: ${esc(r.dep.t)}</div>`:""}
      </div>
      <div class="tltrack" style="background:${trackBg}">
        <div class="tlbar" title="${esc(title)}" style="left:${(r.startIdx/14*100).toFixed(2)}%;width:${(r.span/14*100).toFixed(2)}%;background:${barBg}"><span>${barLabel}</span></div>
        ${r.t.milestone?`<span class="tldiamond" style="left:${(((r.endIdx+0.5)/14)*100-1).toFixed(2)}%">◆</span>`:""}
      </div>`;
    sec.appendChild(row);
  });
  if(!rows.length){
    const e=document.createElement("div");e.className="tlempty";
    e.textContent="No open tasks with deadlines in the next two weeks. Give a few tasks a date and they'll appear here.";
    sec.appendChild(e);
  }
  const unsch=open.filter(t=>!t.deadline);
  if(unsch.length){
    const h=document.createElement("div");h.className="unschh";h.textContent="No date yet";sec.appendChild(h);
    const box=document.createElement("div");
    unsch.forEach(t=>{
      const room=t.roomIds[0]?roomById(t.roomIds[0]):null;
      const s=document.createElement("span");s.className="uchip";
      s.innerHTML=`<span class="ndot" style="background:${room?room.dot:"#B29A62"}"></span>${esc(t.t)}`;
      box.appendChild(s);
    });
    sec.appendChild(box);
  }
  wrap.appendChild(sec);
}
/* ---------- notes view */
function renderNotes(wrap){
  const grid=document.createElement("div");grid.className="notesgrid";
  const left=document.createElement("div");left.className="cat";
  left.innerHTML=`<h3 style="margin:0 0 4px;font-size:15px;display:flex">📓 Brain dump</h3>
    <div class="sub" style="margin-bottom:10px">Empty your head here — one thought per line. Nothing is a commitment yet.</div>
    <textarea class="dumpta" placeholder="everything on your mind…">${esc(state.dump)}</textarea>
    <div id="dumplines"></div>`;
  const ta=left.querySelector(".dumpta");
  const linesBox=left.querySelector("#dumplines");
  const renderLines=()=>{
    linesBox.innerHTML="";
    const lines=state.dump.split("\n").map(l=>l.trim()).filter(Boolean);
    if(!lines.length)return;
    const head=document.createElement("div");head.className="lnhead";
    const opts=state.rooms.map(r=>`<option value="${r.id}" ${ (ui.notesRoom||state.rooms[0]&&state.rooms[0].id)===r.id?"selected":""}>${esc(r.name)}</option>`).join("");
    head.innerHTML=`<div class="detlabel">Turn a line into a task</div><label style="font-size:11px;color:var(--muted);font-weight:700">into room <select>${opts}</select></label>`;
    head.querySelector("select").onchange=e=>{ui.notesRoom=e.target.value;};
    linesBox.appendChild(head);
    lines.forEach(line=>{
      const row=document.createElement("div");row.className="lnrow";
      row.innerHTML=`<span class="lt">${esc(line)}</span><button class="mkbtn">→ task</button>`;
      row.querySelector(".mkbtn").onclick=()=>{
        const roomId=ui.notesRoom||(state.rooms[0]&&state.rooms[0].id);
        if(!roomId)return;
        let removed=false;
        state.dump=state.dump.split("\n").filter(l=>{if(!removed&&l.trim()===line){removed=true;return false;}return true;}).join("\n");
        addTaskTo(roomId,line);
        const room=roomById(roomId);
        toast("Moved into “"+(room?room.name:"the house")+"” as a task 🛠️");
      };
      linesBox.appendChild(row);
    });
  };
  ta.oninput=()=>{state.dump=ta.value;save();renderLines();};
  renderLines();
  const right=document.createElement("div");right.className="helpcard";
  right.innerHTML=`<h3>Breaking it down</h3>
    <div class="hp">A thought becomes doable when it's one small action. For each line, ask yourself:</div>
    <div class="hq">1 · What's the very first physical action?</div>
    <div class="hq">2 · Can it be done in one sitting? If not, split it.</div>
    <div class="hq">3 · Which room of your life does it belong to?</div>
    <div class="hi">A line you turn into a task moves out of the dump and into the house.</div>`;
  grid.appendChild(left);grid.appendChild(right);
  wrap.appendChild(grid);
}
function renderTasks(){
  const wrap=document.getElementById("taskContent");wrap.innerHTML="";
  if(state.daily.storm){
    wrap.innerHTML=`<div class="cozycard"><div class="big">⛈🏡🔥</div>
      <h3>The house is resting today</h3>
      <p>Rain on the windows, fire in the fireplace. No tasks, no deadlines, no red — they'll all be exactly where you left them, and your streak is safe. Go be a person.</p>
      <button id="endStorm">☀ Okay, the sky cleared</button></div>`;
    wrap.querySelector("#endStorm").onclick=()=>{state.daily.storm=false;save();renderAll();toast("Welcome back 💛 the house missed you");};
    return;
  }
  if(state.view==="next")renderNextView(wrap);
  else if(state.view==="cal")renderCalendar(wrap);
  else if(state.view==="timeline")renderTimeline(wrap);
  else if(state.view==="notes")renderNotes(wrap);
  else renderRoomsView(wrap);
}

const overlay=document.getElementById("overlay"),modal=document.getElementById("modal");
function openModal(html,pop){
  modal.innerHTML=html;
  modal.classList.toggle("pop",!!pop);
  overlay.classList.toggle("center",!!pop);
  overlay.classList.add("show");
}

overlay.onclick=e=>{if(e.target===overlay)closeModal();};

function tagModal(){
  let html=`<h2>🏷 Tags <button class="mx">×</button></h2>
  <p class="msub">Rename any tag, pick its colour, reorder (order = priority for Suggest 3), add your own.</p><div id="tagrows">`;
  state.tags.forEach((g,i)=>{
    html+=`<div class="mrow" data-i="${i}">
      <input type="color" value="${g.color}" data-k="color">
      <input type="text" value="${esc(g.label)}" data-k="label" maxlength="14">
      <button class="mini" data-a="up" ${i===0?"disabled":""}>↑</button>
      <button class="mini" data-a="down" ${i===state.tags.length-1?"disabled":""}>↓</button>
      <button class="mini" data-a="del" ${state.tags.length<=1?"disabled":""}>🗑</button>
    </div>`;
  });
  html+=`</div><button class="maddbtn" id="tagAdd">+ add a tag</button>
  <div class="note">Tap a task's tag pill to cycle through these. Deleting a tag moves its tasks to the first tag.</div>`;
  openModal(html);
  modal.querySelector(".mx").onclick=closeModal;
  modal.querySelectorAll(".mrow").forEach(row=>{
    const i=+row.dataset.i,g=state.tags[i];
    row.querySelector('[data-k="color"]').oninput=e=>{g.color=e.target.value;save();renderTasks();};
    row.querySelector('[data-k="label"]').oninput=e=>{g.label=e.target.value.toUpperCase()||"TAG";save();renderTasks();};
    row.querySelector('[data-a="up"]').onclick=()=>{if(i>0){[state.tags[i-1],state.tags[i]]=[state.tags[i],state.tags[i-1]];save();renderTasks();tagModal();}};
    row.querySelector('[data-a="down"]').onclick=()=>{if(i<state.tags.length-1){[state.tags[i+1],state.tags[i]]=[state.tags[i],state.tags[i+1]];save();renderTasks();tagModal();}};
    row.querySelector('[data-a="del"]').onclick=()=>{
      if(state.tags.length<=1)return;
      const gone=state.tags.splice(i,1)[0];
      state.tasks.forEach(t=>{if(t.tagId===gone.id)t.tagId=state.tags[0].id;});
      save();renderTasks();tagModal();};
  });
  modal.querySelector("#tagAdd").onclick=()=>{
    state.tags.push({id:uid(),label:"NEW TAG",color:"#3E8E7E"});save();renderTasks();tagModal();};
}

/* ---------- mailbox: reminders & events */
function mailboxModal(){
  const items=[
    ...state.reminders.map(r=>({kind:"rem",o:r})),
    ...state.events.map(ev=>({kind:"event",o:ev}))
  ].sort((a,b)=>(a.o.date||"9999")<(b.o.date||"9999")?-1:1);
  const d=ui.remDraft;

/* ---------- ICS import */
function parseICS(text){
  const unfolded=text.replace(/\r?\n[ \t]/g,"");
  const lines=unfolded.split(/\r?\n/);
  const events=[];let cur=null;
  for(const ln of lines){
    if(ln.startsWith("BEGIN:VEVENT"))cur={};
    else if(ln.startsWith("END:VEVENT")){if(cur&&cur.t)events.push(cur);cur=null;}
    else if(cur){
      if(ln.startsWith("SUMMARY"))cur.t=ln.slice(ln.indexOf(":")+1).replace(/\\,/g,",").replace(/\\;/g,";").replace(/\\n/g," ").trim();
      else if(ln.startsWith("DTSTART")){
        const v2=ln.slice(ln.indexOf(":")+1).trim();
        const m=v2.match(/^(\d{4})(\d{2})(\d{2})/);
        if(m)cur.deadline=`${m[1]}-${m[2]}-${m[3]}`;
      }
    }
  }
  return events;
}
document.getElementById("icsFile").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    const events=parseICS(String(rd.result));
    let added=0;
    events.forEach(ev=>{
      if(state.tasks.some(t=>t.t===ev.t&&t.deadline===(ev.deadline||"")))return;
      const order=Math.max(-1,...state.tasks.map(t=>t.order))+1+added;
      state.tasks.push({id:uid(),t:ev.t,tagId:state.tags[0].id,deadline:ev.deadline||"",d:false,roomIds:[],
        details:"",need:"",blocker:"",collab:"",moves:0,order,dependsOn:null,milestone:false});
      added++;
    });
    save();renderAll();
    toast(added?`📅 ${added} event${added>1?"s":""} imported to Inbox`:"No new events found");
  };
  rd.readAsText(f);e.target.value="";
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  /* Public Firebase web config — not a secret. Security comes from Firestore rules,
     the authorized-domain list, and this key's HTTP-referrer + API restrictions. */
  apiKey: "AIzaSyAZdBeObQhNXxaqfc6kDlsmm3QqIJTIOTQ",
  authDomain: "balance-house-bbcf8.firebaseapp.com",
  projectId: "balance-house-bbcf8",
  storageBucket: "balance-house-bbcf8.firebasestorage.app",
  messagingSenderId: "954848906500",
  appId: "1:954848906500:web:4055ab2a4f3fa5ed2c5451"
};

const B = window.__bh;
try {
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let unsub = null, pushTimer = null, pendingPush = false;

  /* "who wins" rule: more edits (rev) wins; equal edits → newer write wins */
  const isNewer = (aRev, aUpd, bRev, bUpd) =>
    (aRev || 0) > (bRev || 0) || ((aRev || 0) === (bRev || 0) && (aUpd || 0) > (bUpd || 0));

  async function doPush() {
    if (!auth.currentUser) return;
    clearTimeout(pushTimer); pushTimer = null;
    try {
      await setDoc(doc(db, "users", auth.currentUser.uid), {
        state: JSON.stringify(B.state),
        updatedAt: B.state.updatedAt || Date.now(),
        rev: B.state.rev || 0,
        email: auth.currentUser.email || ""
      });
      pendingPush = false;
      B.setSyncState("saved");
    } catch (e) { B.setSyncState("offline"); }
  }
  window.cloudPush = () => {
    if (!auth.currentUser) return;
    pendingPush = true;
    B.setSyncState("saving");
    clearTimeout(pushTimer);
    pushTimer = setTimeout(doPush, 900);
  };
  /* never lose the last second of work: flush immediately when the page hides/closes */
  const flushNow = () => { if (pendingPush) doPush(); };
  document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") flushNow(); });
  addEventListener("pagehide", flushNow);

  /* device-independent daily snapshots in the cloud: users/{uid}/backups/{date}, kept 14 days */
  async function cloudBackupDaily() {
    if (!auth.currentUser) return;
    try {
      const dateKey = new Date().toISOString().slice(0, 10);
      const bref = doc(db, "users", auth.currentUser.uid, "backups", dateKey);
      const ex = await getDoc(bref);
      if (!ex.exists()) {
        await setDoc(bref, { state: JSON.stringify(B.state), savedAt: Date.now() });
        const all = await getDocs(collection(db, "users", auth.currentUser.uid, "backups"));
        const ids = all.docs.map(x => x.id).sort();
        while (ids.length > 14) await deleteDoc(doc(db, "users", auth.currentUser.uid, "backups", ids.shift()));
      }
      const el = document.getElementById("backupInfo");
      if (el) el.textContent = "🛟 Today's cloud backup ✓ — your house is safe to open anywhere";
    } catch (e) {}
  }
  window.__cloudBackups = {
    list: async () => {
      if (!auth.currentUser) return [];
      const all = await getDocs(collection(db, "users", auth.currentUser.uid, "backups"));
      return all.docs.map(x => x.id).sort().reverse();
    },
    get: async id => {
      if (!auth.currentUser) return null;
      const s = await getDoc(doc(db, "users", auth.currentUser.uid, "backups", id));
      return s.exists() ? s.data() : null;
    }
  };

  B.cloud.api = {
    signIn: async () => {
      try { await signInWithPopup(auth, new GoogleAuthProvider()); }
      catch (e) { if (e && e.code !== "auth/popup-closed-by-user") B.toast("Sign-in didn't complete — try again"); }
    },
    signOut: async () => {
      if (!confirm("Sign out? This device switches to the demo house — your own house stays safe in your account and comes back when you sign in.")) return;
      if (unsub) { unsub(); unsub = null; }
      clearTimeout(pushTimer); pendingPush = false;
      await signOut(auth);
      B.localWipe(); // privacy: no personal house left on a signed-out device
      B.toast("Signed out — this device now shows the demo house");
    }
  };

  onAuthStateChanged(auth, async user => {
    B.cloud.user = user; B.cloud.ready = true;
    if (unsub) { unsub(); unsub = null; }
    if (user) {
      const ref = doc(db, "users", user.uid);
      let snap = null;
      try { snap = await getDoc(ref); } catch (e) {}
      if (snap && snap.exists() && snap.data().state) {
        const d = snap.data();
        try {
          const remote = JSON.parse(d.state);
          const rRev = d.rev !== undefined ? d.rev : (remote.rev || 0);
          if (isNewer(rRev, d.updatedAt, B.state.rev, B.state.updatedAt)) {
            B.applyRemote(remote, d.updatedAt);
            B.toast("☁ Your house is back — right where you left off");
          } else {
            window.cloudPush(); // local has more work → it becomes the cloud copy
          }
        } catch (e) { window.cloudPush(); }
      } else {
        window.cloudPush();      // brand-new account → seed the cloud with local state
        if (!B.state.onboarded) B.onboardNewUser();  // ask the goal question if they haven't answered yet
      }
      setTimeout(cloudBackupDaily, 4000); // snapshot today's reconciled state
      /* live sync from other devices */
      unsub = onSnapshot(ref, s => {
        if (!s.exists()) return;
        const d = s.data();
        if (!d.state) return;
        try {
          const remote = JSON.parse(d.state);
          const rRev = d.rev !== undefined ? d.rev : (remote.rev || 0);
          if (isNewer(rRev, d.updatedAt, B.state.rev, B.state.updatedAt)) B.applyRemote(remote, d.updatedAt);
        } catch (e) {}
      }, () => {});
    }
    B.renderAuth();
  });
} catch (e) {
  B.cloud.ready = false; B.renderAuth();
}
</script>
</body>
</html>
